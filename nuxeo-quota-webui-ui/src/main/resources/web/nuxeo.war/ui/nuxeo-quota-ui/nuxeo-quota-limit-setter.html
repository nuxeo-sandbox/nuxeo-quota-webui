<!--
  <nuxeo-quota-limit-setter
      document="[[document]]"
      target="group"
      target-name="members"
      current-max-upload="52428800"
      current-max-total="2147483648"
      read-only="[[someValue]]"
      on-saved="[[onSaved]]"
  ></nuxeo-quota-limit-setter>
  target: "group" or "user" (or omit for document mode using the existing Quotas.SetMaxSize)
  target-name: the group name or username
  current-max-upload: current max upload size in bytes
  current-max-total: current max total quota in bytes
  read-only: disable editing
  on-saved: callback after successful save
-->
<link rel="import" href="nuxeo-quota-behavior.html">
<dom-module id="nuxeo-quota-limit-setter">
  <template>
    <style include="iron-flex iron-flex-alignment nuxeo-styles">
      .actionCard {
        border-width: 1px;
        border-style: solid;
        border-color: lightgray;
      }
    </style>

    <div class="layout horizontal flex">
      <div class="layout vertical" style="margin-left: 50px">
        <nuxeo-input id="quotaValueObject"
                     label="[[i18n('label.quota.maxSize')]]"
                     type="number"
                     value="{{quotaValue}}"
                     disabled$="[[readOnly]]"></nuxeo-input>
        <div>
          (Max: [[maxSizeStr]])
        </div>
      </div>

      <nuxeo-select id="quotaUnitObject"
                    label="Unit"
                    selected="{{quotaValueUnit}}"
                    options="[[_getUnits()]]"
                    style="margin-left: 25px"
                    disabled$="[[readOnly]]">
      </nuxeo-select>

      <div class="layout vertical" style="margin-left: 25px;">
        <paper-checkbox checked="{{unlimited}}" disabled$="[[readOnly]]">
          [[i18n('label.quota.user.unlimited')]]
        </paper-checkbox>
      </div>

      <div>
        <paper-button id="saveQuotaObject"
                      disabled$="[[_computeSaveDisabled(readOnly, unlimited, quotaValue)]]"
                      class="secondary"
                      style="margin-left: 50px;"
                      on-tap="_saveQuota">Save</paper-button>
      </div>
    </div>

  </template>

  <script>
    Polymer({
      is: 'nuxeo-quota-limit-setter',
      behaviors: [Nuxeo.LayoutBehavior, Nuxeo.QuotaBehavior],
      properties: {
        document: Object,
        target: String,
        targetName: String,
        currentMaxUpload: {
          type: Number,
          observer: "_currentMaxUploadChanged"
        },
        currentMaxTotal: {
          type: Number,
          observer: "_currentMaxTotalChanged"
        },
        readOnly: {
          type: Boolean,
          value: true,
          observer: "_readOnlyChanged"
        },
        onSaved: Function,
        forUserWorkspaces: Boolean,

        // Internal
        quotaValue: {
          type: Number,
          observer: "_quotaValueChanged"
        },
        quotaValueUnit: {
          type: String,
          value: "MB"
        },
        unlimited: {
          type: Boolean,
          value: false,
          observer: "_unlimitedChanged"
        },
        units: {
          type: Array,
          value: [
            {id: "B", label: "Bytes"},
            {id: "KB", label: "KB"},
            {id: "MB", label: "MB"},
            {id: "GB", label: "GB"},
          ]
        },
        maxSizeStr: String
      },

      ready: function() {
        this._updateState();
      },

      _getUnits: function() {
        return this.getUnitsForDropDown();
      },

      _currentMaxUploadChanged: function(newValue) {
        if (newValue && newValue > 0) {
          var vu = this.formatBytes(newValue);
          this.quotaValue = vu.value;
          this.quotaValueUnit = vu.unit;
        } else if (newValue === -1) {
          this.unlimited = true;
        }
        this._updateState();
      },

      _currentMaxTotalChanged: function(newValue) {
        if (newValue && newValue > 0) {
          var vu = this.formatBytes(newValue);
          this.quotaValue = vu.value;
          this.quotaValueUnit = vu.unit;
        } else if (newValue === -1) {
          this.unlimited = true;
        }
        this._updateState();
      },

      _readOnlyChanged: function(newValue) {
        this._updateState();
      },

      _unlimitedChanged: function() {
        this._updateState();
      },

      _updateState: function() {
        if (this.readOnly) {
          this.$.saveQuotaObject.disabled = true;
          return;
        }
        this._enableDisableObjects();
      },

      _enableDisableObjects: function() {
        this.$.quotaValueObject.disabled = this.readOnly || this.unlimited;
        this.$.quotaUnitObject.disabled = this.readOnly || this.unlimited;
        this.$.saveQuotaObject.disabled = this.readOnly || (!this.unlimited && (!this.quotaValue || this.quotaValue <= 0));
      },

      _quotaValueChanged: function(value) {
        if (!this.readOnly) {
          this.unlimited = false;
        }
        this._enableDisableObjects();
        // Check against max
        if (this.maxSize && value) {
          var valueBytes = this.getValueBytes(value, this.quotaValueUnit);
          if (valueBytes > this.maxSize) {
            alert("Value can't be greater than " + this.maxSizeStr);
            var vu = this.formatBytes(this.maxSize);
            this.quotaValue = vu.value;
            this.quotaUnit = vu.unit;
          }
        }
      },

      _computeSaveDisabled: function(readOnly, unlimited, quotaValue) {
        if (readOnly) {
          return true;
        }
        if (unlimited) {
          return false;
        }
        return !quotaValue || quotaValue <= 0;
      },

      _saveQuota: function() {
        var maxSizeBytes;
        if (this.unlimited) {
          maxSizeBytes = -1;
        } else if (this.quotaValue > 0) {
          maxSizeBytes = this.getValueBytes(this.quotaValue, this.quotaValueUnit);
        }

        if (this.document && !this.target) {
          // Document mode: use existing Quotas.SetMaxSize
          if (!this.forUserWorkspaces) {
            var op = this.$.setQuotaOnDocOp;
            if (op) {
              op.input = this.document;
              op.params = { targetSize: maxSizeBytes };
              op.execute()
                .then(function(result) {
                  this.fire('notify', { message: "Quota updated." });
                  if (this.onSaved) {
                    this.onSaved();
                  }
                }.bind(this))
                .catch(function(err) {
                  alert("An error occured: " + err);
                }.bind(this))
            }
          } else {
            var op = this.$.setOnUserWorkspacesOp;
            if (op) {
              op.params = { maxSize: maxSizeBytes };
              op.execute()
                .then(function(result) {
                  this.fire('notify', { message: "User Workspaces quota updated." });
                  if (this.onSaved) {
                    this.onSaved();
                  }
                }.bind(this))
                .catch(function(err) {
                  alert("An error occured: " + err);
                }.bind(this))
            }
          }
        } else if (this.target === "group") {
          // Group mode
          if (!this.targetName) {
            alert("No group specified");
            return;
          }
          var op = this.$.setGroupOverrideOp;
          if (op) {
            var params = { group: this.targetName };
            if (maxSizeBytes !== undefined) {
              params.maxUploadSize = "" + maxSizeBytes;
              params.maxTotalQuota = "" + maxSizeBytes;
            }
            op.params = params;
            op.execute()
              .then(function(result) {
                this.fire('notify', { message: "Group override saved." });
                if (this.onSaved) {
                  this.onSaved();
                }
              }.bind(this))
              .catch(function(err) {
                alert("An error occured: " + err);
              }.bind(this))
          }
        } else if (this.target === "user") {
          // User mode
          if (!this.targetName) {
            alert("No user specified");
            return;
          }
          var op = this.$.setUserOverrideOp;
          if (op) {
            var params = { username: this.targetName };
            if (maxSizeBytes !== undefined) {
              params.maxUploadSize = "" + maxSizeBytes;
              params.maxTotalQuota = "" + maxSizeBytes;
            }
            op.params = params;
            op.execute()
              .then(function(result) {
                this.fire('notify', { message: "User override saved." });
                if (this.onSaved) {
                  this.onSaved();
                }
              }.bind(this))
              .catch(function(err) {
                alert("An error occured: " + err);
              }.bind(this))
          }
        }
      }
    });
  </script>
</dom-module>
