<link rel="import" href="nuxeo-quota-behavior.html">
<dom-module id="nuxeo-quota-user-usage">
  <template>
    <style include="nuxeo-styles">
      .usage-info {
        padding: 8px 16px;
        font-size: 13px;
        color: var(--secondary-text-color);
      }
    </style>

    <nuxeo-operation id="getQuotaOp" op="Quota.User.GetForCurrentUser" response="{{quotaInfo}}"></nuxeo-operation>

    <div class="usage-info">
      <template is="dom-if" if="[[_isLimited(quotaInfo)]]">
        <span>[[_formatUsage(quotaInfo.usedBytes, quotaInfo.maxTotalQuota)]]</span>
      </template>
      <template is="dom-if" if="[[!_isLimited(quotaInfo)]]">
        <span>[[_formatUnlimited(quotaInfo.usedBytes)]]</span>
      </template>
    </div>
  </template>

  <script>
    Polymer({
      is: 'nuxeo-quota-user-usage',
      behaviors: [Nuxeo.LayoutBehavior, Nuxeo.QuotaBehavior],
      properties: {
        quotaInfo: {
          type: Object,
          observer: "_quotaInfoChanged"
        }
      },

      attached: function() {
        this.$.getQuotaOp.execute();
      },

      _quotaInfoChanged: function(info) {
        // Optional: refresh periodically
      },

      _isLimited: function(info) {
        return info && info.maxTotalQuota && info.maxTotalQuota > 0;
      },

      _formatUsage: function(used, total) {
        if (!used && used !== 0) {
          return "";
        }
        var usedStr = this._formatBytesShort(used);
        var totalStr = this._formatBytesShort(total);
        return this.i18n('label.quota.user.usage', usedStr, totalStr);
      },

      _formatUnlimited: function(used) {
        if (!used && used !== 0) {
          return "";
        }
        var usedStr = this._formatBytesShort(used);
        return this.i18n('label.quota.user.usage.unlimited', usedStr);
      },

      _formatBytesShort: function(bytes) {
        if (!bytes || bytes <= 0) {
          return "0 B";
        }
        var vu = this.formatBytes(bytes);
        return vu.value + " " + vu.unit;
      }
    });
  </script>
</dom-module>
