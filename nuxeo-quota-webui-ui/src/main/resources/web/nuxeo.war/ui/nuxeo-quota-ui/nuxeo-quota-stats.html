<link rel="import" href="nuxeo-quota-behavior.html">
<dom-module id="nuxeo-quota-stats">
  <template>
    <style include="iron-flex iron-flex-alignment nuxeo-styles">
      chart-pie {
        height: 300px;
      }
      
      .actionCard {
        border-width: 1px;
        border-style: solid;
        border-color: lightgray;
      }
    </style>

    <nuxeo-operation id="quotasStatsOp" op="Quotas.GetStatistics" response="{{stats}}"></nuxeo-operation>

    <nuxeo-card heading="Quota for '[[_getDocTitle(document)]]'" class="actionCard">
      <template is="dom-if" if="[[_hasDocument(document)]]">
        <chart-pie values="[[_quotasChartData(analytics, 'values')]]"
                    labels="[[_quotasChartData(analytics, 'labels')]]"
                    options="[[_quotasChartOptions()]]">
        </chart-pie>
      </template>
    </nuxeo-card>

  </template>

  <script>
    Polymer({
      is: 'nuxeo-quota-stats',
      behaviors: [Nuxeo.LayoutBehavior, Nuxeo.QuotaBehavior],
      properties: {
        document: {
          type: Object,
          observer: "_documentChanged"
        },
        analytics: {
          type: Object,
          value: null,
          // Notified so nuxeo-quota-for-document can derive the
          // "used / max, NN%" reminder without re-running Quotas.GetStatistics.
          notify: true
        },
        defaultChartOptions: {
          type: Object,
          value: {
            legend: { display: false },
            animation: false,
            base: 0.0
          }
        },

        colors: {
          type: Array,
          value: function () {
            return [
              '#3366cc', '#ff9900', '#dc3912', '#109618', '#990099', '#0099c6', '#dd4477', '#66aa00'
            ];
          }
        },

        // Hardcoded English names for the pie-chart slices, matched by index
        // to the upstream order in GetQuotaStatisticsOperation.toJSON()
        // (liveSize, trashSize, sizeVersions). Kept hardcoded so the legend
        // stays locale-independent.
        _SIZE_LABELS: {
          type: Array,
          value: function () {
            return ["Live Documents", "Trash", "Archived Versions"];
          }
        }
      },

      _hasDocument: function(doc) {
        if(doc && doc.uid) {
          return true;
        }

        return false;
      },

      _getDefaultChartOptions: function() {
        // Deep copy
        let str = JSON.stringify(this.defaultChartOptions);
        return JSON.parse(str);
      },

      _quotasChartOptions: function() {
        let options = this._getDefaultChartOptions();
        options.legend = {
          display: true,
          position: "right"
        };
        options.title = {
          display: false
        }
        return options;
      },

      _getDocTitle: function(doc) {
        if(!doc) {
          return "...";
        }

        if(doc.path === "/") {
          return "Root";
        }

        return doc.title;
      },

      _documentChanged: function(doc) {
        if(doc) {
          let op = this.$.quotasStatsOp;
          op.params = {
            documentRef: doc.uid
          };
          op.execute()
            .then(function(result) {
              /*
               * See GetQuotaStatisticsOperation java code. Since LTS 2025.11 we
               * receive something like:
               * [
               *   { "label": "Live Documents Size:2.16 GibiBytes",     "data": 2319461990 },
               *   { "label": "Trash Size:0 KibiBytes",                  "data": 0 },
               *   { "label": "Archived Versions Size:0 KibiBytes",      "data": 0 }
               * ]
               * The unit part (KibiBytes/MebiBytes/GibiBytes) comes from
               * QuotaDisplayValue.format() resolving i18n keys label.unit.KiB /
               * MiB / GiB. We ignore obj.label entirely and rebuild the legend
               * from obj.data (raw bytes) + a hardcoded _SIZE_LABELS array
               * (matched by index to the upstream order in
               * GetQuotaStatisticsOperation.toJSON()), so labels and units stay
               * locale-independent. If a future LTS version adds a 4th stat,
               * the legend will show "Item 4 (...)" — extend _SIZE_LABELS.
               */
              this.analytics = result;
            }.bind(this))
            .catch(function(err) {
              this.fire('notify', { message: "An error occured loading quota statistics.", errorDetails: String(err), duration: 8000 });
            }.bind(this))
        }
      },

      _quotasChartData: function(analytics, what) {

        if(!analytics) {
          return [];
        }

        if(what === "labels") {
          // Hardcoded English names, matched by index to upstream
          // GetQuotaStatisticsOperation.toJSON() order. Units come from
          // formatBytes() (B/KB/MB/GB), so the legend is locale-independent.
          return analytics.map((obj, i) => {
            let name = this._SIZE_LABELS[i] || ("Item " + (i + 1));
            let formatted = this.formatBytes(obj.data);
            return name + " (" + formatted.value + " " + formatted.unit + ")";
          });
        }

        if(what === "values") {
          return analytics.map((obj) => obj.data);
        }
      }
    });
  </script>
</dom-module>
