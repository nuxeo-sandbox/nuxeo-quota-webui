<link rel="import" href="nuxeo-quota-behavior.html">
<dom-module id="nuxeo-quota-stats">
  <template>
    <style include="iron-flex iron-flex-alignment nuxeo-styles">
      chart-pie {
        height: 300px;
      }
      
      .actionCard {
        border-width: 1px;
        border-style: solid;
        border-color: lightgray;
      }

      .info {
        font-size: smaller;
      }
    </style>

    <nuxeo-operation id="quotasStatsOp" op="Quotas.GetStatistics" response="{{stats}}"></nuxeo-operation>

    <nuxeo-card heading="Quota for '[[_getDocTitle(document)]]'" class="actionCard">
      <template is="dom-if" if="[[_hasDocument(document)]]">
        <template is="dom-if" if="[[noStats]]">
          <div class="info">[[i18n('label.quota.error.display')]]</div>
        </template>
        <template is="dom-if" if="[[!noStats]]">
          <chart-pie values="[[_quotasChartData(analytics, 'values')]]"
                      labels="[[_quotasChartData(analytics, 'labels')]]"
                      options="[[_quotasChartOptions()]]">
          </chart-pie>
        </template>
      </template>
    </nuxeo-card>

  </template>

  <script>
    // See org.nuxeo.ecm.quota.size.QuotaAwareDocument.DOCUMENTS_SIZE_STATISTICS_FACET
    const STATS_FACET = 'DocumentsSizeStatistics';

    Polymer({
      is: 'nuxeo-quota-stats',
      behaviors: [Nuxeo.LayoutBehavior, Nuxeo.QuotaBehavior],
      properties: {
        document: {
          type: Object,
          observer: "_documentChanged"
        },
        analytics: {
          type: Object,
          value: null
        },
        noStats: {
          type: Boolean,
          value: false
        },
        defaultChartOptions: {
          type: Object,
          value: {
            legend: { display: false },
            animation: false,
            base: 0.0
          }
        },

        colors: {
          type: Array,
          value: function () {
            return [
              '#3366cc', '#ff9900', '#dc3912', '#109618', '#990099', '#0099c6', '#dd4477', '#66aa00'
            ];
          }
        }
      },

      _hasDocument: function(doc) {
        if(doc && doc.uid) {
          return true;
        }

        return false;
      },

      _getDefaultChartOptions: function() {
        // Deep copy
        let str = JSON.stringify(this.defaultChartOptions);
        return JSON.parse(str);
      },

      _quotasChartOptions: function() {
        let options = this._getDefaultChartOptions();
        options.legend = {
          display: true,
          position: "right"
        };
        options.title = {
          display: false
        }
        return options;
      },

      _getDocTitle: function(doc) {
        if(!doc) {
          return "...";
        }

        if(doc.path === "/") {
          return "Root";
        }

        return doc.title;
      },

      _documentChanged: function(doc) {
        if(!doc) {
          return;
        }
        // Quotas.GetStatistics throws "Quota not activated on doc" when the platform's
        // DocumentsSizeStatistics facet is missing (i.e. before the documentsSizeUpdater
        // initial computation has ever run on this document tree). Gate the call to
        // avoid a 500 and show a friendly hint instead.
        if(!this.hasFacet(doc, STATS_FACET)) {
          this.analytics = null;
          this.noStats = true;
          return;
        }
        this.noStats = false;
        let op = this.$.quotasStatsOp;
        op.params = {
          documentRef: doc.uid
        };
        op.execute()
          .then(function(result) {
            /* See GetQuotaStatisticsOperation java code. We recevie sometuing like:
[
 {
   "label": "Live Documents Size:2.16 MBytes",
   "data": 2261560
 },
 {
   "label": "Trash Size:0 KBytes",
   "data": 0
 },
 {
   "label": "Archived Versions Size:0 KBytes",
   "data": 0
 }
]
*/
            this.analytics = result;
          }.bind(this))
          .catch(function(err) {
            this.fire('notify', { message: 'Failed to load quota statistics: ' + err, type: 'error' });
          }.bind(this))
      },

      _quotasChartData: function(analytics, what) {

        if(!analytics) {
          return [];
        }

        if(what === "labels") {
          // Re-format labels from raw bytes (analytics[i].data) instead of trusting the
          // platform's pre-formatted label string. In LTS 2025 the platform's
          // GetQuotaStatisticsOperation produces malformed unit names like "GiBiBytes" /
          // "KiBiBytes" (SizeUtils changes). Build "<name> (<value> <unit>)" ourselves.
          // For zero bytes show just "0" (no unit) — formatBytes() returns an undefined
          // value field when bytes <= 0.
          return analytics.map(function(obj) {
            var name = obj.label.split(" Size:")[0];
            if(!obj.data || obj.data <= 0) {
              return name + " (0)";
            }
            var vu = this.formatBytes(obj.data);
            return name + " (" + vu.value + " " + vu.unit + ")";
          }.bind(this));
        }

        if(what === "values") {
          return analytics.map((obj) => obj.data);
        }
      }
    });
  </script>
</dom-module>
