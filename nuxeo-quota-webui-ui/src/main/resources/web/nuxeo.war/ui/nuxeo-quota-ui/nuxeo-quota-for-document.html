Shared with nuxeo-quota-admin-userws via Nuxeo.QuotaBehavior
(unit dropdown via getUnitsForDropDown, formatBytes, getValueBytes).
The per-element observers (_quotaValueChanged, _checkQuotaValue, ...)
intentionally stay local: they reference element-specific button IDs
and source-of-truth properties (originalQuota here, quotaConfig in
admin-userws) that don't cleanly factor through a behavior.
-->
<!--
  paper-tabs / paper-tab / iron-pages are not imported explicitly:
  the host Web UI has already loaded them as transitive deps (same as
  paper-button below). Adding our own import via a relative path would
  not resolve at runtime since this plugin ships into nuxeo.war and
  has no bower_components of its own.
-->
<link rel="import" href="nuxeo-quota-stats.html">
<link rel="import" href="nuxeo-quota-heaviest-list.html">
<link rel="import" href="nuxeo-quota-behavior.html">
<dom-module id="nuxeo-quota-for-document">
  <template>
    <style include="iron-flex iron-flex-alignment nuxeo-styles">
      .content {
        @apply --layout-vertical;
      }

      .actionInfo {
        max-width: var(--admin-button-width);
        margin-top:  10px;
        font-size: smaller;
      }

      .actionInfo .moreInfo {
        font-size: x-small;
        font-style: italic;
      }

      .actionCard {
        border-width: 1px;
        border-style: solid;
        border-color: lightgray;
      }

      paper-tabs {
        --paper-tabs-selection-bar-color: var(--nuxeo-primary-color, #0066ff);
        background: var(--nuxeo-sidebar-background, #fafafa);
        border-bottom: 1px solid var(--nuxeo-border, #e3e3e3);
      }

      paper-tab {
        --paper-tab-ink: var(--nuxeo-primary-color, #0066ff);
        text-transform: uppercase;
        font-size: 0.85rem;
      }

      .usageReminder {
        padding: 10px 16px;
        font-weight: 500;
        border-bottom: 1px solid var(--nuxeo-border, #e3e3e3);
        background: var(--nuxeo-box, #fff);
      }

      iron-pages > section {
        padding-top: 12px;
      }
    </style>

    <nuxeo-operation id="getQuotaOp" op="Quota.GetContainerQuota" response="{{originalQuota}}"></nuxeo-operation>
    <nuxeo-operation id="setQuotaOp" op="Quotas.SetMaxSize"></nuxeo-operation>

    <paper-tabs selected="{{selectedTab}}" attr-for-selected="name" noink>
      <paper-tab name="stats">[[i18n('label.quota.tab.stats')]]</paper-tab>
      <paper-tab name="heaviest">[[i18n('label.quota.tab.heaviest')]]</paper-tab>
    </paper-tabs>

    <!--
      Usage reminder — always visible, regardless of the selected tab.
      Sourced from the existing data: originalQuota.quotaValue (from
      Quota.GetContainerQuota) for the max, and _usedAnalytics (notified
      up from <nuxeo-quota-stats>) summed across slices for the used size.
      No extra round-trip vs. the previous layout.
    -->
    <template is="dom-if" if="[[_showUsageReminder(originalQuota, _usedBytes)]]">
      <div class="usageReminder">[[_usageReminderText(originalQuota, _usedBytes)]]</div>
    </template>

    <iron-pages selected="[[selectedTab]]" attr-for-selected="name">

      <section name="stats">
        <nuxeo-card heading="[[i18n('adm.quota.statistics')]]">
          <!--
            analytics is notify:true on <nuxeo-quota-stats> so we get the
            raw sizes here without re-running Quotas.GetStatistics.
          -->
          <nuxeo-quota-stats document="[[document]]" analytics="{{_usedAnalytics}}"></nuxeo-quota-stats>
        </nuxeo-card>

        <nuxeo-card heading="[[i18n('action.activate.quota')]]" class="actionCard">
          <div class="layout horizontal flex">
            <div class="layout vertical" style="margin-left: 50px">
              <nuxeo-input id="quotaValueObj"
                          label="[[i18n('label.quota.maxSize')]]"
                          type="number"
                          value="{{quotaValue}}"></nuxeo-input>
              <template is="dom-if" if="[[!_hasOriginalQuota(originalQuota)]]">
                (No quota set on this container)
              </template>
              <div>
                Max: [[originalQuota.maxQuotaSizeStr]]
              </div>
            </div>

            <nuxeo-select id="quotaValueObj"
                          label="Unit"
                          selected="{{quotaUnit}}"
                          options="[[getUnitsForDropDown()]]"
                          style="margin-left: 25px">
            </nuxeo-select>

            <div>
              <paper-button id="saveQuota"
                            disabled
                            class="secondary"
                            style="margin-left: 50px;"
                            on-tap="_saveQuota">Save</paper-button>

              <paper-button id="disableQuota"
                            disabled
                            class="secondary"
                            style="margin-left: 50px;"
                            on-tap="_disableQuota">Disable Quota</paper-button>
            </div>
          </div>
        </nuxeo-card>
      </section>

      <section name="heaviest">
        <!--
          No <nuxeo-card collapsible> wrapper here on purpose: the list lives
          in its own sub-tab, the collapse affordance would be redundant, and
          the <nuxeo-card> 'opened' quirk (no notify:true) no longer matters.
        -->
        <nuxeo-quota-heaviest-list mode="children" document="[[document]]"></nuxeo-quota-heaviest-list>
      </section>

    </iron-pages>

  </template>

  <script>
    Polymer({
      is: 'nuxeo-quota-for-document',
      behaviors: [Nuxeo.LayoutBehavior, Nuxeo.QuotaBehavior],
      properties: {
        document: {
          type: Object,
          observer: "_documentChanged"
        },
        originalQuota: {
          type: Object,
          observer: "_originalQuotaChanged"
        },
        quotaValue: {
          type: Number,
          observer: "_quotaValueChanged"
        },
        quotaUnit: {
          type: String,
          value:"MB"
        },
        // Active sub-tab. Default: "stats" (pie chart + action card).
        selectedTab: {
          type: String,
          value: "stats"
        },
        // Filled by <nuxeo-quota-stats> via two-way binding (analytics is
        // notify:true). Shape: [{label, data}, ...] — see GetQuotaStatisticsOperation.
        _usedAnalytics: {
          type: Array,
          value: null
        },
        // Sum of every slice's raw bytes. Drives the "NNN GB on NNN, NN%" reminder.
        _usedBytes: {
          type: Number,
          computed: "_computeUsedBytes(_usedAnalytics)"
        }
      },

      _documentChanged: function(doc) {
        if(doc) {
          let op = this.$.getQuotaOp;
          op.input = doc;
          op.execute()
            .then(function(result) {
              // Nothing, _originalQuotaChanged() will be called
            }.bind(this))
            .catch(function(error) {
              this.fire('notify', { message: "An error occured loading the quota for this container.", errorDetails: String(error), duration: 8000 });
            }.bind(this))
        }
      },

      /*
       * Usage-reminder helpers. The reminder reuses data already loaded by
       * the page: originalQuota (from Quota.GetContainerQuota) and the
       * analytics array notified up by <nuxeo-quota-stats>. No extra op
       * round-trip vs. the previous (cardless) layout.
       */
      _computeUsedBytes: function(analytics) {
        if (!Array.isArray(analytics)) {
          return -1;
        }
        return analytics.reduce(function(sum, item) {
          return sum + (item && typeof item.data === "number" ? item.data : 0);
        }, 0);
      },

      _showUsageReminder: function(originalQuota, usedBytes) {
        // Wait for both sources to be ready to avoid a "0 B / 0 B, NaN%" flash.
        return originalQuota != null && typeof usedBytes === "number" && usedBytes >= 0;
      },

      _usageReminderText: function(originalQuota, usedBytes) {
        let used = this.formatBytes(usedBytes);
        let usedStr = used.value + " " + used.unit;
        let max = originalQuota ? originalQuota.quotaValue : -1;
        if (max == null || max <= 0) {
          return usedStr + " used (no quota set)";
        }
        let maxFmt = this.formatBytes(max);
        let pct = Math.round((usedBytes / max) * 100);
        // Cap the displayed percentage at 100 for over-quota containers.
        let pctDisplay = Math.min(pct, 100);
        return usedStr + " on " + maxFmt.value + " " + maxFmt.unit + ", " + pctDisplay + "%";
      },

      _hasOriginalQuota: function(quotaObj) {
        if(!quotaObj || !quotaObj.quotaValue || quotaObj.quotaValue <= 0) {
          return false;
        }

        return true;
      },

      _originalQuotaChanged: function(result) {
        if(result) {
          if(result.quotaValue <= 0) {
            this.quotaValue = null;
          } else {
            let valueAndUnit = this.formatBytes(result.quotaValue);
            this.quotaValue = valueAndUnit.value;
            this.quotaUnit = valueAndUnit.unit;
          }
        }

        if(result && result.quotaValue > 0) {
          this.$.disableQuota.disabled = false;
        } else {
          this.$.disableQuota.disabled = true;
        }
      },

      _checkQuotaValue: function() {
        let valueBytes = this.getValueBytes(this.quotaValue, this.quotaUnit);
        if(this.originalQuota && valueBytes > this.originalQuota.maxQuotaSize) {
          
          this.fire('notify', { message: "Value can't be greater than " + this.originalQuota.maxQuotaSizeStr, duration: 4000 });
          let valueAndUnit = this.formatBytes(this.originalQuota.maxQuotaSize);
          this.quotaValue = valueAndUnit.value;
          this.quotaUnit = valueAndUnit.unit;
        }
      },

      _quotaValueChanged: function(value) {
        let disable = value <= 0;
        if(this.$.saveQuota.disabled !== disable) {
          this.$.saveQuota.disabled = disable;
        }

        this._checkQuotaValue();
      },

      _quotaUnitChanged: function(value) {
        this._checkQuotaValue();
      },

      _saveQuota: function() {
        let maxSizeBytes = null;
        let msg;
        if(this.quotaValue <= 0 || !this.quotaUnit) {
          this.fire('notify', { message: "Invalid value: <" + this.quotaValue + " " + this.quotaUnit + ">", duration: 4000 });
        } else {
          if(confirm("Set max quota for this container (" + this.document.title + ") to " + this.quotaValue + " " + this.quotaUnit + "?")) {
            maxSizeBytes = this.getValueBytes(this.quotaValue, this.quotaUnit);
          }
        }

          if(maxSizeBytes && maxSizeBytes !== 0) {
            let op = this.$.setQuotaOp;
            op.input = this.document;
            op.params = { targetSize: maxSizeBytes };
            op.execute()
              .then(function(result) {
                this.fire('notify', { message: "Quota set on the container <" + this.document.title + ">." });
                // Force refresh values (the operation returns the value of the quota)
                this._documentChanged(this.document);
              }.bind(this))
              .catch(function(err) {
                this.fire('notify', { message: "An error occured saving the quota.", errorDetails: String(err), duration: 8000 });
              }.bind(this))
          }
        },

        _disableQuota: function() {
          if(!confirm("Disable Quota on this container (" + this.document.title + ") ?")) {
            return;
          }
          let op = this.$.setQuotaOp;
          op.input = this.document;
          op.params = { targetSize: -1 };
          op.execute()
            .then(function(result) {
              this.fire('notify', { message: "Quota unset on the container <" + this.document.title + ">." });
              // Force refresh values (the operation returns the value of the quota)
              this._documentChanged(this.document);
            }.bind(this))
            .catch(function(error) {
              this.fire('notify', { message: "An error occured disabling the quota.", errorDetails: String(error), duration: 8000 });
            }.bind(this));
        }
    });
  </script>
</dom-module>
