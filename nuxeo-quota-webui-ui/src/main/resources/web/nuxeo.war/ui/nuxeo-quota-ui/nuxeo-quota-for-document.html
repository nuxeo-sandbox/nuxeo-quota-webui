      done to centralize the things (units, handling values, etc.). Some utilities
      are centralized in QuotaBehavior, like units, formating bytes, ...
-->
<link rel="import" href="nuxeo-quota-stats.html">
<link rel="import" href="nuxeo-quota-behavior.html">
<dom-module id="nuxeo-quota-for-document">
  <template>
    <style include="iron-flex iron-flex-alignment nuxeo-styles">
      .content {
        @apply --layout-vertical;
      }

      .actionInfo {
        max-width: var(--admin-button-width);
        margin-top:  10px;
        font-size: smaller;
      }

      .actionInfo .moreInfo {
        font-size: x-small;
        font-style: italic;
      }

      .actionCard {
        border-width: 1px;
        border-style: solid;
        border-color: lightgray;
      }

      .usage-info {
        font-size: 14px;
        margin-bottom: 16px;
        padding: 8px 12px;
        background-color: var(--nuxeo-box, #f5f5f5);
        border-radius: 4px;
      }

      .usage-info .percentage {
        font-weight: 500;
        margin-left: 8px;
      }
    </style>

    <nuxeo-operation id="getQuotaOp" op="Quota.GetContainerQuota" response="{{originalQuota}}"></nuxeo-operation>
    <nuxeo-operation id="setQuotaOp" op="Quotas.SetMaxSize"></nuxeo-operation>
    <nuxeo-operation id="canManageOp" op="Quota.CanManageQuotas"></nuxeo-operation>

    <nuxeo-card heading="[[i18n('adm.quota.statistics')]]">
      <nuxeo-quota-stats document="[[document]]"></nuxeo-quota-stats>
    </nuxeo-card>

    <nuxeo-card heading="[[i18n('action.activate.quota')]]" class="actionCard">
      <!-- Usage info: visible to all users -->
      <div class="usage-info">
        <template is="dom-if" if="[[_hasQuotaLimit(originalQuota)]]">
          [[_formatUsageText(originalQuota)]]
          <span class="percentage">([[_formatPercentage(originalQuota)]])</span>
        </template>
        <template is="dom-if" if="[[!_hasQuotaLimit(originalQuota)]]">
          [[_formatUsedOnly(originalQuota)]]
        </template>
      </div>

      <!-- Edit controls: only visible to admins or users with Everything permission -->
      <template is="dom-if" if="[[_canEdit]]">
        <div class="layout horizontal flex">
          <div class="layout vertical" style="margin-left: 50px">
            <nuxeo-input id="quotaValueObj"
                        label="[[i18n('label.quota.maxSize')]]"
                        type="number"
                        value="{{quotaValue}}"></nuxeo-input>
            <template is="dom-if" if="[[!_hasOriginalQuota(originalQuota)]]">
              (No quota set on this container)
            </template>
            <div>
              Max: [[originalQuota.maxQuotaSizeStr]]
            </div>
          </div>
        
          <nuxeo-select id="quotaUnitSelect"
                        label="Unit"
                        selected="{{quotaUnit}}"
                        options="[[_getUnits()]]"
                        style="margin-left: 25px">
          </nuxeo-select>

          <div>
            <paper-button id="saveQuota"
                          disabled
                          class="secondary"
                          style="margin-left: 50px;"
                          on-tap="_saveQuota">Save</paper-button>
            
            <paper-button id="disableQuota"
                          disabled
                          class="secondary"
                          style="margin-left: 50px;"
                          on-tap="_disableQuota">Disable Quota</paper-button>
          </div>
        </div>
      </template>
    </nuxeo-card>

  </template>

  <script>
    Polymer({
      is: 'nuxeo-quota-for-document',
      behaviors: [Nuxeo.LayoutBehavior, Nuxeo.QuotaBehavior],
      properties: {
        document: {
          type: Object,
          observer: "_documentChanged"
        },
        user: {
          type: Object
        },
        _canManage: {
          type: Boolean,
          value: false
        },
        _canEdit: {
          type: Boolean,
          computed: "_computeCanEdit(user, document, _canManage)"
        },
        originalQuota: {
          type: Object,
          observer: "_originalQuotaChanged"
        },
        quotaValue: {
          type: Number,
          value: null,
          observer: "_quotaValueChanged"
        },
        quotaUnit: {
          type: String,
          value:"MB"
        }
      },

      _documentChanged: function(doc) {
        if(doc) {
          let op = this.$.getQuotaOp;
          op.input = doc;
          op.execute()
            .then(function(result) {
              // Nothing, _originalQuotaChanged() will be called
            }.bind(this))
            .catch(function(err) {
              this.fire('notify', { message: 'Failed to load container quota: ' + err, type: 'error' });
            }.bind(this))
        }
      },

      attached: function() {
        // Resolve whether the current user can manage quotas. The server-side
        // operations re-validate this; the result here only drives UI visibility.
        this.$.canManageOp.execute()
          .then(function(blob) {
            this._canManage = !!(blob && blob.canManage);
          }.bind(this))
          .catch(function() {
            this._canManage = false;
          }.bind(this));
      },

      _hasOriginalQuota: function(quotaObj) {
        if(!quotaObj || !quotaObj.quotaValue || quotaObj.quotaValue <= 0) {
          return false;
        }

        return true;
      },

      _getUnits: function() {
        return this.getUnitsForDropDown();
      },

      _originalQuotaChanged: function(result) {
        if(result) {
          if(result.quotaValue <= 0) {
            this.quotaValue = null;
          } else {
            let valueAndUnit = this.formatBytes(result.quotaValue);
            this.quotaValue = valueAndUnit.value;
            this.quotaUnit = valueAndUnit.unit;
          }
        }

        // Only update button states if _canEdit and buttons exist
        if(this._canEdit && this.$$('#disableQuota')) {
          if(result && result.quotaValue > 0) {
            this.$$('#disableQuota').disabled = false;
          } else {
            this.$$('#disableQuota').disabled = true;
          }
        }
      },

      _checkQuotaValue: function() {
        let valueBytes = this.getValueBytes(this.quotaValue, this.quotaUnit);
        if(this.originalQuota && valueBytes > this.originalQuota.maxQuotaSize) {
          
          this.fire('notify', { message: "Value can't be greater than " + this.originalQuota.maxQuotaSizeStr });
          let valueAndUnit = this.formatBytes(this.originalQuota.maxQuotaSize);
          this.quotaValue = valueAndUnit.value;
          this.quotaUnit = valueAndUnit.unit;
        }
      },

      _quotaValueChanged: function(value) {
        // Dom-if ready?
        if(!this.$$ || !this.$$('#saveQuota')) {
          return;
        }
        let disable = value <= 0;
        if(this.$$('#saveQuota').disabled !== disable) {
          this.$$('#saveQuota').disabled = disable;
        }

        this._checkQuotaValue();
      },

      _quotaUnitChanged: function(value) {
        this._checkQuotaValue();
      },

      _saveQuota: function() {
        let maxSizeBytes = null;
        let msg;
        if(this.quotaValue <= 0 || !this.quotaUnit) {
          this.fire('notify', { message: "Invalid value: <" + this.quotaValue + " " + this.quotaUnit + ">" });
        } else {
          if(confirm("Set max quota for this container (" + this.document.title + ") to " + this.quotaValue + " " + this.quotaUnit + "?")) {
            maxSizeBytes = this.getValueBytes(this.quotaValue, this.quotaUnit);
          }
        }

          if(maxSizeBytes && maxSizeBytes !== 0) {
            let op = this.$.setQuotaOp;
            op.input = this.document;
            op.params = { targetSize: maxSizeBytes };
            op.execute()
              .then(function(result) {
                this.fire('notify', { message: "Quota set on the container <" + this.document.title + ">." });
                // Force refresh values (the operation returns the value of the quota)
                this._documentChanged(this.document);
              }.bind(this))
              .catch(function(err) {
                this.fire('notify', { message: 'Failed to set quota: ' + err, type: 'error' });
              }.bind(this))
          }
        },

        _disableQuota: function() {
          if(!confirm("Disable Quota on this container (" + this.document.title + ") ?")) {
            return;
          }
          let op = this.$.setQuotaOp;
          op.input = this.document;
          op.params = { targetSize: -1 };
          op.execute()
            .then(function(result) {
              this.fire('notify', { message: "Quota unset on the container <" + this.document.title + ">." });
              // Force refresh values (the operation returns the value of the quota)
              this._documentChanged(this.document);
            }.bind(this))
            .catch(function(err) {
              this.fire('notify', { message: 'Failed to disable quota: ' + err, type: 'error' });
            }.bind(this));
        },

        _computeCanEdit: function(user, doc, canManage) {
          if (user && user.isAdministrator) {
            return true;
          }
          if (canManage) {
            return true;
          }
          if (doc && this.hasPermission(doc, 'Everything')) {
            return true;
          }
          return false;
        },

        _hasQuotaLimit: function(quotaObj) {
          return quotaObj && quotaObj.quotaValue && quotaObj.quotaValue > 0;
        },

        _formatUsageText: function(quotaObj) {
          if (!quotaObj) {
            return '';
          }
          var usedStr = this._formatSizeStr(quotaObj.totalSize || 0);
          var limitStr = this._formatSizeStr(quotaObj.quotaValue);
          return usedStr + ' ' + this.i18n('label.quota.usage.of') + ' ' + limitStr;
        },

        _formatUsedOnly: function(quotaObj) {
          if (!quotaObj) {
            return '';
          }
          var usedStr = this._formatSizeStr(quotaObj.totalSize || 0);
          return usedStr + ' ' + this.i18n('label.quota.usage.used');
        },

        _formatPercentage: function(quotaObj) {
          if (!quotaObj || !quotaObj.quotaValue || quotaObj.quotaValue <= 0) {
            return '0%';
          }
          var used = quotaObj.totalSize || 0;
          var limit = quotaObj.quotaValue;
          var pct = Math.round((used / limit) * 100);
          return pct + '%';
        },

        _formatSizeStr: function(bytes) {
          if (!bytes || bytes <= 0) {
            return '0 B';
          }
          var vu = this.formatBytes(bytes);
          return vu.value + ' ' + vu.unit;
        }
    });
  </script>
</dom-module>
