<link rel="import" href="nuxeo-quota-behavior.html">
<link rel="import" href="nuxeo-quota-limit-setter.html">
<dom-module id="nuxeo-quota-user-config">
  <template>
    <style include="iron-flex iron-flex-alignment nuxeo-styles">
      .actionCard {
        border-width: 1px;
        border-style: solid;
        border-color: lightgray;
        padding: 16px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th, td {
        text-align: left;
        padding: 8px;
        border-bottom: 1px solid #ddd;
      }
      .badge-xml {
        background-color: #e0e0e0;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 12px;
      }
      .badge-override {
        background-color: #ffcc02;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 12px;
      }
    </style>

    <nuxeo-operation id="getConfigOp" op="Quota.User.GetConfiguration" auto response="{{config}}"></nuxeo-operation>
    <nuxeo-operation id="setGroupOverrideOp" op="Quota.User.SetGroupOverride"></nuxeo-operation>
    <nuxeo-operation id="setUserOverrideOp" op="Quota.User.SetUserOverride"></nuxeo-operation>
    <nuxeo-operation id="clearGroupOverrideOp" op="Quota.User.ClearGroupOverride"></nuxeo-operation>
    <nuxeo-operation id="clearUserOverrideOp" op="Quota.User.ClearUserOverride"></nuxeo-operation>
    <nuxeo-operation id="getForUserOp" op="Quota.User.GetForUser"></nuxeo-operation>
    <nuxeo-operation id="recomputeUsersOp" op="Quota.User.RecomputeUsers"></nuxeo-operation>
    <nuxeo-operation id="recomputeAllOp" op="Quota.User.RecomputeAll"></nuxeo-operation>

    <nuxeo-card heading="[[i18n('label.quota.user.config')]]" class="actionCard">
      <paper-tabs selected="{{selectedTab}}" attr-for-selected="tab-name">
        <paper-tab tab-name="groups">[[i18n('label.quota.user.perGroup')]]</paper-tab>
        <paper-tab tab-name="users">[[i18n('label.quota.user.perUser')]]</paper-tab>
      </paper-tabs>

      <!-- Per-group tab -->
      <iron-pages selected="{{selectedTab}}" attr-for-selected="tab-name">
        <div tab-name="groups">
          <div class="layout horizontal" style="margin-bottom: 12px;">
            <nuxeo-user-suggestion search-type="GROUP_TYPE"
                                   placeholder="add group..."
                                   value="{{newGroupName}}"
                                   style="flex: 1;"></nuxeo-user-suggestion>
            <paper-button class="secondary" on-tap="_addGroupOverride" disabled$="[[!newGroupName]]">
              [[i18n('action.quota.user.addGroup')]]
            </paper-button>
          </div>

          <table>
            <thead>
              <tr>
                <th>Group</th>
                <th>[[i18n('label.quota.user.maxUploadSize')]]</th>
                <th>[[i18n('label.quota.user.maxTotalQuota')]]</th>
                <th>Source</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <template is="dom-repeat" items="{{_mergedGroupRows(config.xmlDefaults, config.groupOverrides)}}" as="row">
                <tr>
                  <td>[[row.group]]</td>
                  <td>[[_formatBytes(row.maxUploadSize)]]</td>
                  <td>[[_formatBytes(row.maxTotalQuota)]]</td>
                  <td>
                    <span class$="[[_badgeClass(row.source)]]">[[_sourceLabel(row.source)]]</span>
                  </td>
                  <td>
                    <template is="dom-if" if="[[_isOverrideRow(row.source)]]">
                      <paper-button class="secondary" on-tap="_editGroup" data-group$="[[row.group]]">
                        [[i18n('action.quota.user.edit')]]
                      </paper-button>
                      <paper-button class="secondary" on-tap="_resetGroup" data-group$="[[row.group]]">
                        [[i18n('action.quota.user.reset')]]
                      </paper-button>
                    </template>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>

        <!-- Per-user tab -->
        <div tab-name="users">
          <div class="layout horizontal" style="margin-bottom: 12px;">
            <nuxeo-user-suggestion placeholder="add user..."
                                   value="{{newUserName}}"
                                   style="flex: 1;"></nuxeo-user-suggestion>
            <paper-button class="secondary" on-tap="_addUserOverride" disabled$="[[!newUserName]]">
              [[i18n('action.quota.user.addUser')]]
            </paper-button>
          </div>

          <table>
            <thead>
              <tr>
                <th>User</th>
                <th>[[i18n('label.quota.user.maxUploadSize')]]</th>
                <th>[[i18n('label.quota.user.maxTotalQuota')]]</th>
                <th>Current Usage</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <template is="dom-repeat" items="{{config.userOverrides}}" as="override">
                <tr>
                  <td>[[override.username]]</td>
                  <td>[[_formatBytes(override.maxUploadSize)]]</td>
                  <td>[[_formatBytes(override.maxTotalQuota)]]</td>
                  <td>[[_fetchUsage(override.username)]]</td>
                  <td>
                    <paper-button class="secondary" on-tap="_editUser" data-username$="[[override.username]]">
                      [[i18n('action.quota.user.edit')]]
                    </paper-button>
                    <paper-button class="secondary" on-tap="_removeUser" data-username$="[[override.username]]">
                      [[i18n('action.quota.user.remove')]]
                    </paper-button>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
      </iron-pages>

      <!-- ==================== Recompute per-user counters ==================== -->
      <nuxeo-card heading="[[i18n('label.quota.user.recompute')]]" style="margin-top: 16px;">
        <div class="info" style="font-size: smaller; margin-bottom: 8px;">
          [[i18n('label.quota.user.recompute.help')]]
        </div>
        <div class="layout horizontal center" style="gap: 8px;">
          <paper-input label="[[i18n('label.quota.user.recompute.users.input')]]"
                       value="{{_recomputeUsersInput}}"
                       placeholder="alice,bob,svc-import"
                       style="flex: 1;"></paper-input>
          <paper-button class="secondary" on-tap="_recomputeUsers"
                        disabled$="[[_recomputeBusy]]">
            [[i18n('action.quota.user.recompute.users')]]
          </paper-button>
          <paper-button class="secondary" on-tap="_recomputeAll"
                        disabled$="[[_recomputeBusy]]">
            [[i18n('action.quota.user.recompute.all')]]
          </paper-button>
        </div>
      </nuxeo-card>

      <!-- Edit dialog -->
      <paper-dialog id="editDialog" modal>
        <h2>[[_editTitle]]</h2>
        <nuxeo-quota-limit-setter
            id="limitSetter"
            target="{{_editTarget}}"
            target-name="{{_editTargetName}}"
            current-max-upload="[[_editMaxUpload]]"
            current-max-total="[[_editMaxTotal]]"
            read-only="[[_alwaysEditable]]"
            on-saved="_onEditSaved"></nuxeo-quota-limit-setter>
        <div class="buttons">
          <paper-button dialog-dismiss>Cancel</paper-button>
        </div>
      </paper-dialog>
    </nuxeo-card>
  </template>

  <script>
    Polymer({
      is: 'nuxeo-quota-user-config',
      behaviors: [Nuxeo.LayoutBehavior, Nuxeo.QuotaBehavior],
      properties: {
        config: Object,
        selectedTab: {
          type: String,
          value: "groups"
        },
        newGroupName: String,
        newUserName: String,
        _editTarget: String,
        _editTargetName: String,
        _editMaxUpload: Number,
        _editMaxTotal: Number,
        _editTitle: String,
        _usageCache: Object,
        _recomputeUsersInput: String,
        _recomputeBusy: { type: Boolean, value: false },
        _recomputeCommandId: String,
        _alwaysEditable: { type: Boolean, value: false }
      },

      _mergedGroupRows: function(xmlDefaults, groupOverrides) {
        var map = {};
        if (xmlDefaults) {
          for (var i = 0; i < xmlDefaults.length; i++) {
            var d = xmlDefaults[i];
            map[d.group] = {
              group: d.group,
              maxUploadSize: d.maxUploadSize,
              maxTotalQuota: d.maxTotalQuota,
              source: "xml"
            };
          }
        }
        if (groupOverrides) {
          for (var i = 0; i < groupOverrides.length; i++) {
            var o = groupOverrides[i];
            if (!map[o.group]) {
              map[o.group] = { group: o.group, maxUploadSize: null, maxTotalQuota: null, source: "override" };
            }
            if (o.maxUploadSize !== undefined) {
              map[o.group].maxUploadSize = o.maxUploadSize;
            }
            if (o.maxTotalQuota !== undefined) {
              map[o.group].maxTotalQuota = o.maxTotalQuota;
            }
            map[o.group].source = "override";
          }
        }
        var rows = [];
        for (var key in map) {
          rows.push(map[key]);
        }
        rows.sort(function(a, b) { return a.group.localeCompare(b.group); });
        return rows;
      },

      _formatBytes: function(val) {
        if (!val || val <= 0) {
          return "-";
        }
        if (val === -1 || val === "-1") {
          return this.i18n('label.quota.user.unlimited');
        }
        var vu = this.formatBytes(parseInt(val));
        return vu.value + " " + vu.unit;
      },

      _badgeClass: function(source) {
        return source === "override" ? "badge-override" : "badge-xml";
      },

      _sourceLabel: function(source) {
        if (source === "override") {
          return this.i18n('label.quota.user.source.override');
        }
        return this.i18n('label.quota.user.source.xml');
      },

      _isOverrideRow: function(source) {
        return source === "override";
      },

      _addGroupOverride: function() {
        this._editTarget = "group";
        this._editTargetName = this.newGroupName;
        this._editMaxUpload = null;
        this._editMaxTotal = null;
        this._editTitle = "Override for " + this.newGroupName;
        this.$.editDialog.open();
      },

      _addUserOverride: function() {
        this._editTarget = "user";
        this._editTargetName = this.newUserName;
        this._editMaxUpload = null;
        this._editMaxTotal = null;
        this._editTitle = "Override for " + this.newUserName;
        this.$.editDialog.open();
      },

      _editGroup: function(evt) {
        var group = evt.target.getAttribute("data-group");
        var row = this._findGroupRow(group);
        this._editTarget = "group";
        this._editTargetName = group;
        this._editMaxUpload = row ? row.maxUploadSize : null;
        this._editMaxTotal = row ? row.maxTotalQuota : null;
        this._editTitle = "Edit override for " + group;
        this.$.editDialog.open();
      },

      _editUser: function(evt) {
        var username = evt.target.getAttribute("data-username");
        this._editTarget = "user";
        this._editTargetName = username;
        this._editMaxUpload = null;
        this._editMaxTotal = null;
        this._editTitle = "Edit override for " + username;
        this.$.editDialog.open();
      },

      _findGroupRow: function(group) {
        if (!this.config || !this.config.groupOverrides) {
          return null;
        }
        for (var i = 0; i < this.config.groupOverrides.length; i++) {
          if (this.config.groupOverrides[i].group === group) {
            return this.config.groupOverrides[i];
          }
        }
        return null;
      },

      _resetGroup: function(evt) {
        var group = evt.target.getAttribute("data-group");
        var op = this.$.clearGroupOverrideOp;
        op.params = { group: group };
        op.execute()
          .then(function(result) {
            this.$.getConfigOp.execute();
            this.fire('notify', { message: "Group override cleared." });
          }.bind(this))
          .catch(function(err) {
            this.fire('notify', { message: 'Failed to clear group override: ' + err, type: 'error' });
          }.bind(this))
      },

      _removeUser: function(evt) {
        var username = evt.target.getAttribute("data-username");
        var op = this.$.clearUserOverrideOp;
        op.params = { username: username };
        op.execute()
          .then(function(result) {
            this.$.getConfigOp.execute();
            this.fire('notify', { message: "User override cleared." });
          }.bind(this))
          .catch(function(err) {
            this.fire('notify', { message: 'Failed to clear user override: ' + err, type: 'error' });
          }.bind(this))
      },

      _onEditSaved: function() {
        this.$.getConfigOp.execute();
        this.$.editDialog.close();
      },

      _fetchUsage: function(username) {
        if (!this._usageCache) {
          this._usageCache = {};
        }
        if (this._usageCache[username]) {
          var cached = this._usageCache[username];
          return this.formatBytes(cached).value + " " + this.formatBytes(cached).unit;
        }
        var op = this.$.getForUserOp;
        op.params = { username: username };
        op.execute()
          .then(function(result) {
            this._usageCache[username] = result.usedBytes;
            // Force re-render
            this.notifyPath('config.userOverrides');
          }.bind(this))
          .catch(function(err) {
            // Silently ignore
          }.bind(this))
        return "...";
      },

      /* ==================== Recompute handlers ==================== */

      _recomputeUsers: function() {
        if (!this._recomputeUsersInput || !this._recomputeUsersInput.trim()) {
          return;
        }
        var users = this._recomputeUsersInput.split(',').map(function(s) {
          return s.trim();
        }).filter(function(s) { return s.length > 0; });
        if (users.length === 0) {
          return;
        }
        var op = this.$.recomputeUsersOp;
        op.params = { users: users.join('\n') };
        this._submitRecompute(op);
      },

      _recomputeAll: function() {
        this._submitRecompute(this.$.recomputeAllOp);
      },

      _submitRecompute: function(op) {
        this._recomputeBusy = true;
        op.execute()
          .then(function(result) {
            // Operation returns a JSON blob; nuxeo-operation parses it when content-type is JSON
            var payload = (result && typeof result === 'object') ? result : null;
            var cmdId = payload && payload.commandId ? payload.commandId : '?';
            this._recomputeCommandId = cmdId;
            this.fire('notify', { message: this.i18n('label.quota.user.recompute.submitted', cmdId) });
            // Poll for completion: BAF status via /api/v1/management/bulk-actions/{commandId} not always
            // available in older platforms; instead, refresh the config card after a short delay and
            // again at 5/15/30s so the user sees updated counters as the BAF progresses.
            this._scheduleRecomputeRefresh([3000, 10000, 30000]);
          }.bind(this))
          .catch(function(err) {
            this._recomputeBusy = false;
            this.fire('notify', { message: "Recompute failed: " + err });
          }.bind(this));
      },

      _scheduleRecomputeRefresh: function(delaysMs) {
        var self = this;
        delaysMs.forEach(function(delay, idx) {
          setTimeout(function() {
            self._usageCache = {}; // bust the per-user usage cache
            self.$.getConfigOp.execute();
            if (idx === delaysMs.length - 1) {
              self._recomputeBusy = false;
              self.fire('notify', { message: self.i18n('label.quota.user.recompute.done', '?', '?') });
            }
          }, delay);
        });
      }
    });
  </script>
</dom-module>
